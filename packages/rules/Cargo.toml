[package]
name = "gasguard-rules"
version = "0.1.0"
edition = "2021"

[dependencies]
gasguard-ast = { path = "../../libs/ast" }
syn = { version = "2.0", features = ["full", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
regex = "1.10"

[dev-dependencies]
mockall = "0.14.0"
rstest = "0.26.1"
